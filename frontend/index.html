<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ FootballIQ – Match Predictor</title>
  <style>
    /* ── Reset & base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2430;
      --border:   #30363d;
      --accent:   #238636;
      --accent2:  #1f6feb;
      --home:     #1a7f37;
      --draw:     #9e6a03;
      --away:     #b91c1c;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --gold:     #d29922;
      --radius:   12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #0d1117 0%, #1a2332 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo { display: flex; align-items: center; gap: .75rem; }
    .logo-icon { font-size: 2rem; }
    .logo-text h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.5px; }
    .logo-text p  { font-size: .8rem; color: var(--muted); }
    .status-badge {
      font-size: .75rem; padding: .3rem .8rem; border-radius: 99px;
      background: rgba(35,134,54,.15); color: #3fb950;
      border: 1px solid rgba(35,134,54,.4);
    }

    /* ── Layout ──────────────────────────────────────────────────────── */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Card ────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    /* ── Team selector ────────────────────────────────────────────────── */
    .selector-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1.5rem;
      align-items: end;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 650px) {
      .selector-grid { grid-template-columns: 1fr; text-align: center; }
      .vs-badge { display: none; }
    }
    .field-group label {
      display: block; font-size: .8rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: .5rem;
    }
    .field-group select,
    .field-group input {
      width: 100%; padding: .7rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
    }
    .field-group select:focus,
    .field-group input:focus {
      outline: none;
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(31,111,235,.2);
    }
    .vs-badge {
      text-align: center;
      font-size: 1.4rem; font-weight: 800;
      color: var(--muted); padding-bottom: .5rem;
    }
    .division-row { margin-bottom: 1.5rem; }
    .division-row label {
      font-size: .8rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; display: block; margin-bottom: .5rem;
    }
    .division-row select {
      width: 100%; padding: .7rem 1rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 1rem;
    }

    /* ── Predict button ───────────────────────────────────────────────── */
    .btn-predict {
      width: 100%; padding: .9rem;
      background: linear-gradient(135deg, #238636 0%, #1a7f37 100%);
      color: #fff; border: none; border-radius: 8px;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-predict:hover  { opacity: .9; }
    .btn-predict:active { transform: scale(.98); }
    .btn-predict:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Spinner ──────────────────────────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results section ──────────────────────────────────────────────── */
    #results { margin-top: 2rem; display: none; }
    #results.visible { display: block; }

    .match-header {
      text-align: center; margin-bottom: 2rem;
    }
    .match-title {
      font-size: 1.6rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center; gap: 1rem;
    }
    .team-name-h { color: #58a6ff; }
    .team-name-a { color: #f78166; }
    .match-subtitle { font-size: .9rem; color: var(--muted); margin-top: .4rem; }

    /* ── Outcome banner ───────────────────────────────────────────────── */
    .outcome-banner {
      padding: 1.5rem; border-radius: var(--radius);
      text-align: center; margin-bottom: 1.5rem;
      border: 1px solid transparent;
    }
    .outcome-banner.home  { background: rgba(26,127,55,.15);  border-color: rgba(26,127,55,.4);  }
    .outcome-banner.draw  { background: rgba(158,106,3,.15);  border-color: rgba(158,106,3,.4);  }
    .outcome-banner.away  { background: rgba(185,28,28,.15);  border-color: rgba(185,28,28,.4);  }
    .outcome-banner .label { font-size: .85rem; color: var(--muted); margin-bottom: .3rem; }
    .outcome-banner .result { font-size: 2rem; font-weight: 800; }
    .outcome-banner.home .result  { color: #3fb950; }
    .outcome-banner.draw .result  { color: #e3b341; }
    .outcome-banner.away .result  { color: #f85149; }

    /* ── Probability bars ─────────────────────────────────────────────── */
    .prob-section { margin-bottom: 1.5rem; }
    .prob-section h3 { font-size: .9rem; color: var(--muted); text-transform: uppercase;
                       letter-spacing: .08em; margin-bottom: 1rem; }
    .prob-row { display: flex; align-items: center; gap: 1rem; margin-bottom: .7rem; }
    .prob-label { width: 80px; font-size: .9rem; font-weight: 600; flex-shrink: 0; }
    .prob-bar-bg {
      flex: 1; height: 10px; background: var(--surface2);
      border-radius: 5px; overflow: hidden;
    }
    .prob-bar { height: 100%; border-radius: 5px; transition: width .8s ease; }
    .prob-bar.home { background: linear-gradient(90deg, #238636, #3fb950); }
    .prob-bar.draw { background: linear-gradient(90deg, #9e6a03, #e3b341); }
    .prob-bar.away { background: linear-gradient(90deg, #b91c1c, #f85149); }
    .prob-pct { width: 50px; text-align: right; font-size: .9rem; font-weight: 700; flex-shrink: 0; }

    /* ── Stats grid ───────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 1.2rem;
      text-align: center;
    }
    .stat-card .stat-icon { font-size: 1.6rem; margin-bottom: .4rem; }
    .stat-card .stat-label { font-size: .75rem; color: var(--muted);
                              text-transform: uppercase; letter-spacing: .07em; }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 800; margin: .3rem 0; }
    .stat-card .stat-sub   { font-size: .8rem; color: var(--muted); }

    /* ── Scorelines ───────────────────────────────────────────────────── */
    .scoreline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .75rem; margin-bottom: 1.5rem;
    }
    .score-tile {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem; text-align: center;
      position: relative; transition: border-color .2s;
    }
    .score-tile.top { border-color: var(--gold); }
    .score-tile .score-val { font-size: 1.5rem; font-weight: 800; font-variant-numeric: tabular-nums; }
    .score-tile .score-pct { font-size: .8rem; color: var(--muted); margin-top: .2rem; }
    .score-tile .crown { position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
                         font-size: 1rem; }

    /* ── Betting insights ─────────────────────────────────────────────── */
    .betting-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
    }
    .bet-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.2rem;
      display: flex; align-items: center; gap: .8rem;
    }
    .bet-icon { font-size: 1.5rem; flex-shrink: 0; }
    .bet-info .bet-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; }
    .bet-info .bet-val   { font-size: 1.3rem; font-weight: 800; }
    .bet-info .bet-sub   { font-size: .8rem; color: var(--muted); }

    /* ── Section headings ─────────────────────────────────────────────── */
    .section-title {
      font-size: 1rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .1em; margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Compare bars (team stats) ────────────────────────────────────── */
    .compare-row {
      display: grid; grid-template-columns: 1fr 60px 1fr;
      align-items: center; gap: .5rem; margin-bottom: .8rem;
    }
    .cmp-home { text-align: right; font-weight: 600; font-size: .95rem; }
    .cmp-away { text-align: left;  font-weight: 600; font-size: .95rem; }
    .cmp-label { text-align: center; font-size: .75rem; color: var(--muted); }

    /* ── Error box ────────────────────────────────────────────────────── */
    .error-box {
      background: rgba(185,28,28,.1); border: 1px solid rgba(185,28,28,.4);
      border-radius: var(--radius); padding: 1rem 1.25rem;
      color: #f85149; display: none; margin-top: 1rem;
    }
    .error-box.visible { display: block; }

    /* ── Team-search datalist hint ────────────────────────────────────── */
    datalist { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚽</div>
    <div class="logo-text">
      <h1>FootballIQ</h1>
      <p>AI-Powered Match Predictor</p>
    </div>
  </div>
  <div id="statusBadge" class="status-badge">Loading …</div>
</header>

<main>
  <!-- ── Selector card ──────────────────────────────────────────────── -->
  <div class="card" style="margin-bottom:1.5rem">
    <div class="selector-grid">
      <div class="field-group">
        <label>🏠 Home Team</label>
        <input id="homeTeamInput" list="teamList" placeholder="Type team name …" autocomplete="off" />
      </div>
      <div class="vs-badge">VS</div>
      <div class="field-group">
        <label>✈️ Away Team</label>
        <input id="awayTeamInput" list="teamList" placeholder="Type team name …" autocomplete="off" />
      </div>
    </div>

    <div class="division-row">
      <label>🏆 Competition / Division</label>
      <select id="divisionSelect"><option value="">Loading …</option></select>
    </div>

    <button class="btn-predict" id="predictBtn" onclick="runPrediction()">
      <span>⚡ Predict Match</span>
    </button>

    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- ── Results ────────────────────────────────────────────────────── -->
  <div id="results">

    <div class="match-header">
      <div class="match-title">
        <span class="team-name-h" id="rHomeTeam"></span>
        <span style="color:var(--muted); font-size:1rem">vs</span>
        <span class="team-name-a" id="rAwayTeam"></span>
      </div>
      <div class="match-subtitle" id="rDivision"></div>
    </div>

    <!-- Outcome banner -->
    <div class="outcome-banner" id="outcomeBanner">
      <div class="label">Predicted Result</div>
      <div class="result" id="outcomeText"></div>
    </div>

    <!-- Probabilities -->
    <div class="card" style="margin-bottom:1.5rem">
      <div class="section-title">Win Probabilities</div>
      <div class="prob-section">
        <div class="prob-row">
          <div class="prob-label">Home Win</div>
          <div class="prob-bar-bg"><div class="prob-bar home" id="barHome" style="width:0"></div></div>
          <div class="prob-pct" id="pctHome">–</div>
        </div>
        <div class="prob-row">
          <div class="prob-label">Draw</div>
          <div class="prob-bar-bg"><div class="prob-bar draw" id="barDraw" style="width:0"></div></div>
          <div class="prob-pct" id="pctDraw">–</div>
        </div>
        <div class="prob-row">
          <div class="prob-label">Away Win</div>
          <div class="prob-bar-bg"><div class="prob-bar away" id="barAway" style="width:0"></div></div>
          <div class="prob-pct" id="pctAway">–</div>
        </div>
      </div>
    </div>

    <!-- Expected stats -->
    <div class="card" style="margin-bottom:1.5rem">
      <div class="section-title">Expected Match Stats</div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- Top scorelines -->
    <div class="card" style="margin-bottom:1.5rem">
      <div class="section-title">Most Likely Scorelines</div>
      <div class="scoreline-grid" id="scorelineGrid"></div>
    </div>

    <!-- Betting insights -->
    <div class="card" style="margin-bottom:1.5rem">
      <div class="section-title">Betting Insights</div>
      <div class="betting-grid" id="bettingGrid"></div>
    </div>

    <!-- Team comparison -->
    <div class="card" style="margin-bottom:1.5rem">
      <div class="section-title">Team Comparison</div>
      <div id="teamCompare"></div>
    </div>

  </div><!-- /#results -->
</main>

<!-- datalist for team autocomplete -->
<datalist id="teamList"></datalist>

<script>
const API = "";   // same origin; change to "http://localhost:5000" for local dev

let allTeams = [];
let allDivisions = [];

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const [teamsRes, divsRes, statusRes] = await Promise.all([
      fetch(`${API}/api/teams`).then(r => r.json()),
      fetch(`${API}/api/divisions`).then(r => r.json()),
      fetch(`${API}/api/model-status`).then(r => r.json()),
    ]);

    // Teams
    allTeams = (teamsRes.data?.teams || []);
    const dl = document.getElementById("teamList");
    dl.innerHTML = allTeams.map(t => `<option value="${t}">`).join("");

    // Divisions
    allDivisions = divsRes.data?.divisions || [];
    const sel = document.getElementById("divisionSelect");
    sel.innerHTML = allDivisions
      .map(d => `<option value="${d.code}">${d.label} (${d.code})</option>`)
      .join("");

    // Status badge
    const badge = document.getElementById("statusBadge");
    if (statusRes.status === "ok") {
      const d = statusRes.data;
      badge.textContent = `✓ ${d.team_count} teams · ${d.division_count} leagues`;
      badge.style.background = "rgba(35,134,54,.15)";
    } else {
      badge.textContent = "⚠ Models not ready";
      badge.style.background = "rgba(185,28,28,.15)";
      badge.style.color = "#f85149";
    }
  } catch (err) {
    console.error("Boot failed:", err);
    document.getElementById("statusBadge").textContent = "⚠ API offline";
  }
}

// ── Predict ───────────────────────────────────────────────────────────────
async function runPrediction() {
  const homeTeam = document.getElementById("homeTeamInput").value.trim();
  const awayTeam = document.getElementById("awayTeamInput").value.trim();
  const division = document.getElementById("divisionSelect").value;

  hideError();
  if (!homeTeam || !awayTeam) return showError("Please enter both teams.");
  if (homeTeam === awayTeam)  return showError("Home and away teams must be different.");

  const btn = document.getElementById("predictBtn");
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div> <span>Predicting …</span>`;

  try {
    const res = await fetch(`${API}/api/predict`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ home_team: homeTeam, away_team: awayTeam, division }),
    });
    const json = await res.json();
    if (json.status !== "ok") return showError(json.message || "Prediction failed.");
    renderResults(json.data);
  } catch (err) {
    showError("Network error – is the server running?");
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<span>⚡ Predict Match</span>`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function renderResults(d) {
  const resultsEl = document.getElementById("results");

  // Header
  document.getElementById("rHomeTeam").textContent = d.home_team;
  document.getElementById("rAwayTeam").textContent = d.away_team;
  document.getElementById("rDivision").textContent  = d.division || "";

  // Outcome banner
  const banner = document.getElementById("outcomeBanner");
  const outcomeMap = { "Home Win": "home", "Draw": "draw", "Away Win": "away" };
  banner.className = "outcome-banner " + (outcomeMap[d.predicted_result] || "home");
  document.getElementById("outcomeText").textContent = d.predicted_result;

  // Probabilities
  const p = d.result_probabilities;
  setBar("Home", p["Home Win"]);
  setBar("Draw", p["Draw"]);
  setBar("Away", p["Away Win"]);

  // Stats grid
  document.getElementById("statsGrid").innerHTML = [
    { icon: "⚽", label: "Exp. Goals (Home)", val: d.expected_goals_home, sub: "expected" },
    { icon: "⚽", label: "Exp. Goals (Away)", val: d.expected_goals_away, sub: "expected" },
    { icon: "🎯", label: "Total Goals",        val: d.expected_total_goals, sub: "expected" },
    { icon: "🟡", label: "Bookings (Home)",    val: d.expected_bookings_home, sub: "estimated" },
    { icon: "🟡", label: "Bookings (Away)",    val: d.expected_bookings_away, sub: "estimated" },
    { icon: "🚩", label: "Corners (Home)",     val: d.expected_corners_home, sub: "estimated" },
    { icon: "🚩", label: "Corners (Away)",     val: d.expected_corners_away, sub: "estimated" },
    { icon: "📊", label: "Total Corners",      val: +(d.expected_corners_home + d.expected_corners_away).toFixed(1), sub: "estimated" },
  ].map(s => `
    <div class="stat-card">
      <div class="stat-icon">${s.icon}</div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.val}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>`).join("");

  // Scorelines
  document.getElementById("scorelineGrid").innerHTML = d.top_scorelines
    .map((s, i) => `
      <div class="score-tile ${i === 0 ? "top" : ""}">
        ${i === 0 ? '<div class="crown">👑</div>' : ""}
        <div class="score-val">${s.scoreline}</div>
        <div class="score-pct">${s.probability}%</div>
      </div>`).join("");

  // Betting insights
  const bi = d.betting_insights;
  document.getElementById("bettingGrid").innerHTML = [
    { icon: "⚡", label: "BTTS",      val: bi.btts_probability + "%",  sub: "Both teams to score" },
    { icon: "🔥", label: "Over 2.5",  val: bi.over_2_5_goals + "%",   sub: "Total goals > 2.5" },
    { icon: "💥", label: "Over 3.5",  val: bi.over_3_5_goals + "%",   sub: "Total goals > 3.5" },
    { icon: "🏠", label: "Home Win",  val: p["Home Win"] + "%",        sub: "Win probability" },
    { icon: "🤝", label: "Draw",      val: p["Draw"] + "%",            sub: "Draw probability" },
    { icon: "✈️",  label: "Away Win", val: p["Away Win"] + "%",        sub: "Win probability" },
  ].map(b => `
    <div class="bet-card">
      <div class="bet-icon">${b.icon}</div>
      <div class="bet-info">
        <div class="bet-label">${b.label}</div>
        <div class="bet-val">${b.val}</div>
        <div class="bet-sub">${b.sub}</div>
      </div>
    </div>`).join("");

  // Team comparison
  const hs = d.team_stats_home || {};
  const as_ = d.team_stats_away || {};
  const rows = [
    ["ELO Rating",         hs.elo,            as_.elo],
    ["Roll. Scored",       hs.rollScored,      as_.rollScored],
    ["Roll. Conceded",     hs.rollConceded,    as_.rollConceded],
    ["Form (last 3)",      hs.form3Home,       as_.form3Away],
    ["Form (last 5)",      hs.form5Home,       as_.form5Away],
  ];
  document.getElementById("teamCompare").innerHTML = rows.map(([label, hv, av]) => `
    <div class="compare-row">
      <div class="cmp-home">${fmt(hv)}</div>
      <div class="cmp-label">${label}</div>
      <div class="cmp-away">${fmt(av)}</div>
    </div>`).join("");

  // Show results
  resultsEl.classList.add("visible");
  resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });
}

function setBar(type, pct) {
  const bar = document.getElementById(`bar${type}`);
  const lbl = document.getElementById(`pct${type}`);
  if (bar) { bar.style.width = pct + "%"; }
  if (lbl) { lbl.textContent = pct + "%"; }
}

function fmt(v) {
  if (v === undefined || v === null || v === "") return "–";
  if (typeof v === "number") return v % 1 === 0 ? v : v.toFixed(2);
  return v;
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.textContent = "⚠ " + msg;
  box.classList.add("visible");
}
function hideError() {
  document.getElementById("errorBox").classList.remove("visible");
}

// Allow Enter key
document.addEventListener("keydown", e => {
  if (e.key === "Enter") runPrediction();
});

boot();
</script>
</body>
</html>
